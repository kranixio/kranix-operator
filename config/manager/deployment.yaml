apiVersion: v1
kind: Namespace
metadata:
  name: kranix-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kranix-operator
  namespace: kranix-system
  labels:
    control-plane: controller-manager
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: kranix-operator
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          image: kranix-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /operator
          args:
            - --leader-elect
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kranix-operator-metrics-service
  namespace: kranix-system
  labels:
    control-plane: controller-manager
spec:
  selector:
    control-plane: controller-manager
  ports:
    - name: metrics
      port: 8383
      targetPort: 8383
